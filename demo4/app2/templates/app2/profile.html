{% extends 'mainapp/base.html' %}

{% block content %}
<div class="section-card form-card">
    <h2>Update Profile</h2>
    <p class="small-text">Edit your personal information for App2 access.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="errorlist">{{ form.non_field_errors }}</div>
        {% endif %}
        {% for field in form %}
            {{ field.errors }}
            <label>{{ field.label }}</label>
            {{ field }}
        {% endfor %}
        <button type="submit" class="button full">Save changes</button>
    </form>
</div>
{% endblock %}
