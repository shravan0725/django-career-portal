{% extends 'mainapp/base.html' %}

{% block content %}
<div class="section-card form-card">
    <h2>{% if object %}Edit Application{% else %}Apply for a Job{% endif %}</h2>
    <p class="small-text">Submit your application details and upload your resume securely.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button full">Submit Application</button>
    </form>
</div>
{% endblock %}
