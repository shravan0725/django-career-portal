<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Multi-App Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mini.css/3.0.1/mini-default.min.css" integrity="sha512-m9AZnAj8AelUWmNVJXndh0F2gyq5dK5e+1BxzBiB6A35Cl1XFnRAw31Q+QkXzPjEHdnacwq4pG8jtd6SHBGcnA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1729;
            --surface: rgba(255,255,255,.08);
            --surface-strong: rgba(255,255,255,.12);
            --text: #edf2fb;
            --muted: #9fb1d4;
            --primary: #5fa7ff;
            --primary-strong: #80bdff;
            --border: rgba(255,255,255,.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(95,167,255,.18), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(112,81,255,.18), transparent 24%),
                        linear-gradient(180deg, #08101f 0%, #152243 55%, #0d1729 100%);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 1.25rem 2rem;
            background: rgba(7, 18, 35, 0.88);
            border-bottom: 1px solid rgba(255,255,255,.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #f8fbff;
        }

        header nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        header a {
            color: var(--text);
            opacity: 0.92;
            font-weight: 500;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        header a:hover {
            opacity: 1;
            transform: translateY(-1px);
        }

        main {
            padding: 2rem 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-shell {
            display: grid;
            gap: 1.5rem;
        }

        .card, .section-card {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 24px;
            box-shadow: 0 28px 80px rgba(0,0,0,.18);
            padding: 1.75rem;
            color: var(--text);
        }

        .section-card {
            padding: 2rem;
            backdrop-filter: blur(12px);
        }

        .hero {
            display: grid;
            gap: 1rem;
            padding: 2rem 0 1rem;
        }

        h1, h2, h3, h4 {
            margin: 0;
            color: #f4f8ff;
            line-height: 1.1;
        }

        h2 {
            margin-bottom: 1rem;
            font-size: clamp(1.9rem, 3vw, 2.4rem);
        }

        .grid-3 {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(3, minmax(220px, 1fr));
        }

        .grid-2 {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
        }

        .large-text {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 0.5rem 0 0;
            color: #f3f7ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: rgba(255,255,255,.06);
            border-radius: 16px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,.08);
            color: var(--text);
        }

        th {
            color: var(--muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        tbody tr:hover {
            background: rgba(255,255,255,.06);
        }

        .button, button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.95rem 1.4rem;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-strong));
            color: #fff;
            cursor: pointer;
            text-decoration: none;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .button:hover, button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 35px rgba(95,167,255,.28);
        }

        form {
            margin-top: 1rem;
        }

        label {
            display: block;
            margin-top: 1rem;
            color: #cfd8ff;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.08);
            color: #f4f8ff;
            margin-top: 0.5rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: rgba(95,167,255,.85);
            box-shadow: 0 0 0 6px rgba(95,167,255,.12);
            background: rgba(255,255,255,.14);
        }

        textarea { resize: vertical; }

        .errorlist {
            margin: 0 0 1rem;
            padding: 0.85rem 1rem;
            border-radius: 14px;
            background: rgba(255, 80, 80, 0.12);
            color: #ffb3b3;
            border: 1px solid rgba(255, 80, 80, 0.25);
            list-style: none;
        }

        .errorlist li {
            margin: 0;
        }

        .form-card {
            max-width: 540px;
            margin: 0 auto;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .small-text {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .button.secondary {
            background: rgba(255,255,255,.08);
            color: #eef4ff;
            border: 1px solid rgba(255,255,255,.12);
        }

        .button.full {
            width: 100%;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            white-space: nowrap;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12);
            color: var(--text);
        }

        .status-badge.Pending { background: rgba(255,255,255,.06); color: #cdd6f3; }
        .status-badge.Reviewed { background: rgba(95,167,255,.14); color: #b8d3ff; }
        .status-badge.Selected { background: rgba(84,255,166,.16); color: #b7ffe3; }
        .status-badge.Rejected { background: rgba(255,97,97,.16); color: #ffcccc; }

        .status-select {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 14px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.14);
            color: var(--text);
        }

        .alerts {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 860px) {
            .grid-3 { grid-template-columns: 1fr; }
            header { padding: 1rem 1.25rem; }
        }

        @media (max-width: 560px) {
            .form-card { padding: 1rem; }
        }
    </style>
</head>
<body>
<header>
    <a href="/" class="logo">Job Portal</a>
    <nav>
        <a href="/">Home</a>
        {% if user.is_authenticated %}
            <a href="/dashboard/">Dashboard</a>
            <a href="/app2/logout/">Logout</a>
        {% else %}
            <a href="/app2/login/">Candidate Login</a>
            <a href="/app2/signup/">Candidate Signup</a>
            <a href="/app2/hr/login/">HR Login</a>
        {% endif %}
    </nav>
</header>
<main>
    <div class="page-shell">
        {% if messages %}
            <div class="alerts">
                {% for message in messages %}
                    <div class="card {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</main>
</body>
</html>
